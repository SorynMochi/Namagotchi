<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Namagotchi</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="status-card">
      <p class="eyebrow">Namagotchi Phase 1</p>
      <h1>Server Status</h1>

      <div class="status-grid">
        <div>
          <span class="label">Server</span>
          <strong id="server-status">Checking...</strong>
        </div>

        <div>
          <span class="label">Database</span>
          <strong id="database-status">Checking...</strong>
        </div>

        <div>
          <span class="label">Uptime</span>
          <strong id="uptime">...</strong>
        </div>

        <div>
          <span class="label">Version</span>
          <strong id="version">...</strong>
        </div>
      </div>

      <p id="message" class="message">Nami-chan is peeking at the server lights...</p>

      <button id="refresh-button" type="button">Refresh Status</button>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
